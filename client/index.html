<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<title>サヨ子とお話し</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  :root { --bg:#1b1a17; --panel:#26241f; --ink:#f0ead8; --sub:#a89f8a;
          --user:#7fb4d9; --sayoko:#e6a06b; --line:#3a372f; }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { background:var(--bg); color:var(--ink); font-family:"Yu Gothic UI","Hiragino Sans",sans-serif;
         min-height:100vh; display:flex; flex-direction:column; align-items:center; padding:20px; }
  h1 { font-size:1.3rem; font-weight:600; letter-spacing:.12em; margin-bottom:4px; }
  #status { color:var(--sub); font-size:.85rem; margin-bottom:14px; min-height:1.2em; }
  .wrap { width:min(920px,100%); display:flex; flex-direction:column; gap:14px; }
  .panel { background:var(--panel); border:1px solid var(--line); border-radius:12px; padding:14px; }
  .wave-label { font-size:.8rem; color:var(--sub); margin-bottom:6px; display:flex; justify-content:space-between; }
  canvas { width:100%; height:72px; display:block; background:#141311; border-radius:8px; }
  .legend-user { color:var(--user); } .legend-sayoko { color:var(--sayoko); }
  #controls { display:flex; gap:10px; justify-content:center; }
  button { font:inherit; padding:10px 34px; border-radius:24px; border:1px solid var(--line);
           background:#3d3a32; color:var(--ink); cursor:pointer; letter-spacing:.1em; }
  button:disabled { opacity:.45; cursor:default; }
  #btnStart { background:#5b7d5b; } #btnStop { background:#7d5b5b; }
  #chat { display:flex; flex-direction:column; gap:8px; max-height:44vh; overflow-y:auto; padding:4px; }
  .msg { max-width:78%; padding:8px 12px; border-radius:12px; font-size:.95rem; line-height:1.55; white-space:pre-wrap; }
  .msg.user   { align-self:flex-end; background:#2e3f4c; border:1px solid #3d5468; }
  .msg.sayoko { align-self:flex-start; background:#4c3a2e; border:1px solid #68503d; }
  .msg .who { font-size:.7rem; color:var(--sub); display:block; margin-bottom:2px; }
  .note { font-size:.75rem; color:var(--sub); text-align:center; }
</style>
</head>
<body>
<h1>サヨ子とお話し</h1>
<div id="status">「開始」を押してマイクを許可してください(ヘッドホン推奨)</div>
<div class="wrap">
  <div class="panel">
    <div class="wave-label"><span class="legend-user">■ あなた (マイク)</span></div>
    <canvas id="waveUser" width="880" height="72"></canvas>
    <div style="height:8px"></div>
    <div class="wave-label"><span class="legend-sayoko">■ サヨ子</span></div>
    <canvas id="waveSayoko" width="880" height="72"></canvas>
  </div>
  <div id="controls">
    <button id="btnStart">開始</button>
    <button id="btnStop" disabled>停止</button>
  </div>
  <div class="panel" style="display:flex; gap:12px; align-items:center; flex-wrap:wrap;">
    <label style="font-size:.85rem; display:flex; align-items:center; gap:6px;">
      <input type="checkbox" id="gptMode"> 外部LLM応答の注入 (発話確定ごとに gpt-4o-mini の回答をサヨ子の声で読み上げ)
    </label>
    <span id="keyState" style="font-size:.78rem; color:var(--sub);"></span>
    <span id="gptStatus" style="font-size:.8rem; color:var(--sub);"></span>
  </div>
  <div class="panel"><div id="chat"></div></div>
  <div class="note">あなたの字幕はブラウザの音声認識 (Chromium系のみ)、サヨ子の字幕はモデルのテキストストリーム。<br>
  LLM注入: 発話が確定するとブラウザから直接 OpenAI へ問い合わせ (キーはこのPCから出ません)、回答文をテキストチャンネルへ注入してサヨ子の声で読み上げます。応答待ちの間も相槌などの自由生成は継続します。</div>
</div>

<script>
const FRAME = 1920, SR = 24000;
let ac, ws, micStream, rec, running = false;
let anaU, anaS;

const $ = id => document.getElementById(id);
const status = m => $("status").textContent = m;

/* ---------------- チャット表示 ---------------- */
let sayokoBuf = "", sayokoEl = null, userEl = null;
function bubble(cls, who) {
  const d = document.createElement("div");
  d.className = "msg " + cls;
  d.innerHTML = `<span class="who">${who}</span><span class="body"></span>`;
  $("chat").appendChild(d);
  $("chat").scrollTop = $("chat").scrollHeight;
  return d.querySelector(".body");
}
function sayokoText(piece) {
  if (!sayokoEl) sayokoEl = bubble("sayoko", "サヨ子");
  sayokoBuf += piece;
  sayokoEl.textContent = sayokoBuf.trim();
  $("chat").scrollTop = $("chat").scrollHeight;
  if (/[。?!?!]$/.test(sayokoBuf.trim()) && sayokoBuf.trim().length > 6) {
    sayokoEl = null; sayokoBuf = "";
  }
}
function userText(text, final) {
  if (!userEl) userEl = bubble("user", "あなた");
  userEl.textContent = text;
  $("chat").scrollTop = $("chat").scrollHeight;
  if (final) userEl = null;
}

/* ---------------- 波形 ---------------- */
// 会話音声は振幅が小さく素の波形では見づらいため表示ゲインを掛ける。
// サヨ子側は合成音声で特にレベルが低いので強めに増幅する。
const WAVE_GAIN_USER = 3.5, WAVE_GAIN_SAYOKO = 7.0;
function draw() {
  for (const [ana, cv, color, gain] of [
      [anaU, $("waveUser"),   "#7fb4d9", WAVE_GAIN_USER],
      [anaS, $("waveSayoko"), "#e6a06b", WAVE_GAIN_SAYOKO]]) {
    if (!ana) continue;
    const ctx = cv.getContext("2d");
    const buf = new Float32Array(ana.fftSize);
    ana.getFloatTimeDomainData(buf);
    const h = cv.height, mid = h / 2;
    ctx.fillStyle = "#141311"; ctx.fillRect(0, 0, cv.width, h);
    ctx.strokeStyle = color; ctx.lineWidth = 1.8; ctx.beginPath();
    for (let i = 0; i < buf.length; i++) {
      const x = i / buf.length * cv.width;
      const v = Math.max(-1, Math.min(1, buf[i] * gain));
      const y = mid - v * (mid - 2);
      i ? ctx.lineTo(x, y) : ctx.moveTo(x, y);
    }
    ctx.stroke();
  }
  if (running) requestAnimationFrame(draw);
}

/* ---------------- AudioWorklet ---------------- */
const workletCode = `
class Cap extends AudioWorkletProcessor {
  constructor(){ super(); this.buf = new Float32Array(${FRAME}); this.n = 0; }
  process(inputs){ const ch = inputs[0][0]; if (!ch) return true;
    let i = 0;
    while (i < ch.length) {
      const take = Math.min(${FRAME} - this.n, ch.length - i);
      this.buf.set(ch.subarray(i, i + take), this.n); this.n += take; i += take;
      if (this.n === ${FRAME}) { this.port.postMessage(this.buf.slice(0)); this.n = 0; }
    }
    return true; }
}
class Player extends AudioWorkletProcessor {
  constructor(){ super(); this.q = []; this.cur = null; this.pos = 0;
    this.port.onmessage = e => this.q.push(e.data); }
  process(inputs, outputs){ const out = outputs[0][0];
    let i = 0;
    while (i < out.length) {
      if (!this.cur) { if (!this.q.length) break; this.cur = this.q.shift(); this.pos = 0; }
      const take = Math.min(out.length - i, this.cur.length - this.pos);
      out.set(this.cur.subarray(this.pos, this.pos + take), i);
      i += take; this.pos += take;
      if (this.pos >= this.cur.length) this.cur = null;
    }
    return true; }
}
registerProcessor("cap", Cap);
registerProcessor("player", Player);
`;

/* ---------------- 外部LLM応答の注入 ---------------- */
// APIキーは run.bat が .env から読み、URLフラグメント (#k=) で渡す。
// フラグメントは HTTP リクエストに含まれずサーバへ渡らない。ここでは JS 変数にのみ
// 保持し、localStorage 等への永続化はしない (画面入力・保存は行わない方針)。
let OA_KEY = "";
(function initKey() {
  localStorage.removeItem("oa_key");   // 旧版が保存したキーのキャッシュを消去
  const m = location.hash.match(/k=([^&]+)/);
  if (m) OA_KEY = decodeURIComponent(m[1]);
  history.replaceState(null, "", location.pathname);  // URLからも即時消去
  $("gptMode").checked = !!OA_KEY;
  $("gptMode").disabled = !OA_KEY;
  $("keyState").textContent = OA_KEY
    ? "APIキー: .env から取得済み (画面には出しません)"
    : "APIキー未設定: .env に OPENAI_KEY= を置いて run.bat から起動してください";
})();

const history_ = [];   // {role, content} 直近の対話履歴
let thinking = false;

async function askGPT(userUtt) {
  const key = OA_KEY;
  if (!$("gptMode").checked || !key || thinking) return;
  thinking = true;
  $("gptStatus").textContent = "LLM応答待ち...";
  try {
    history_.push({ role: "user", content: userUtt });
    // stream:true で受信し、句読点区切りの断片が揃うたびに注入する
    // (全文完成を待たないぶん発話開始が約1秒早くなる)
    const res = await fetch("https://api.openai.com/v1/chat/completions", {
      method: "POST",
      headers: { "Content-Type": "application/json", "Authorization": "Bearer " + key },
      body: JSON.stringify({
        model: "gpt-4o-mini",
        max_tokens: 120,
        stream: true,
        messages: [
          { role: "system", content:
            "あなたは81歳の優しい女性「サヨ子」です。相手の話を受け止めて、" +
            "50字以内で、ゆっくりした温かい口調で答えます。難しい言葉は使わず、" +
            "「〜ですねえ」「〜かしらねえ」のような柔らかい言い回しを使います。" },
          ...history_.slice(-8),
        ],
      }),
    });
    if (!res.ok) {
      const j = await res.json().catch(() => ({}));
      $("gptStatus").textContent = "LLMエラー: " + (j.error?.message || res.status);
      return;
    }
    const reader = res.body.getReader();
    const dec = new TextDecoder();
    let sse = "", pending = "", full = "", first = true;
    const flush = () => {
      if (!pending || !ws || ws.readyState !== 1) return;
      ws.send(JSON.stringify({ type: "say", text: pending, mode: first ? "replace" : "append" }));
      first = false; pending = "";
    };
    for (;;) {
      const { done, value } = await reader.read();
      if (done) break;
      sse += dec.decode(value, { stream: true });
      const lines = sse.split("\n"); sse = lines.pop();
      for (const ln of lines) {
        if (!ln.startsWith("data: ") || ln.includes("[DONE]")) continue;
        try {
          const c = JSON.parse(ln.slice(6)).choices?.[0]?.delta?.content;
          if (c) { pending += c; full += c;
                   if (/[、。!?!?]/.test(c) || pending.length >= 14) flush(); }
        } catch (_) {}
      }
    }
    flush();
    if (full) history_.push({ role: "assistant", content: full });
    $("gptStatus").textContent = "";
  } catch (e) {
    $("gptStatus").textContent = "LLM呼び出し失敗: " + e.message;
  } finally {
    thinking = false;
  }
}

/* ---------------- 音声認識 (あなたの字幕 + GPT-live のトリガ) ---------------- */
function startRecognition() {
  const SR_ = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR_) { status("※ このブラウザは音声認識非対応 (字幕とGPT-liveが使えません)"); return; }
  rec = new SR_();
  rec.lang = "ja-JP"; rec.continuous = true; rec.interimResults = true;
  rec.onresult = e => {
    const r = e.results[e.results.length - 1];
    const t = r[0].transcript.trim();
    userText(t, r.isFinal);
    if (r.isFinal && t.length >= 2) askGPT(t);   // 発話確定 -> 裏のGPTへ
  };
  rec.onend = () => { if (running) try { rec.start(); } catch (_) {} };
  try { rec.start(); } catch (_) {}
}

/* ---------------- 開始/停止 ---------------- */
async function start() {
  $("btnStart").disabled = true;
  status("マイク取得中...");
  ac = new AudioContext({ sampleRate: SR });
  micStream = await navigator.mediaDevices.getUserMedia({
    audio: { echoCancellation: true, noiseSuppression: true, channelCount: 1 } });
  const url = URL.createObjectURL(new Blob([workletCode], { type: "text/javascript" }));
  await ac.audioWorklet.addModule(url);

  const src = ac.createMediaStreamSource(micStream);
  const cap = new AudioWorkletNode(ac, "cap");
  const player = new AudioWorkletNode(ac, "player");
  anaU = ac.createAnalyser(); anaU.fftSize = 1024;
  anaS = ac.createAnalyser(); anaS.fftSize = 1024;
  src.connect(anaU); src.connect(cap);
  player.connect(anaS); anaS.connect(ac.destination);

  status("サーバへ接続中...");
  ws = new WebSocket(`ws://${location.host}/ws`);
  ws.binaryType = "arraybuffer";
  ws.onopen = () => { running = true; $("btnStop").disabled = false;
                      status("接続しました。話しかけてください"); draw(); startRecognition(); };
  ws.onmessage = ev => {
    if (typeof ev.data === "string") {
      const m = JSON.parse(ev.data);
      if (m.type === "text") sayokoText(m.text);
      if (m.type === "error") { status("エラー: " + m.message); stop(); }
    } else {
      const i16 = new Int16Array(ev.data);
      const f32 = new Float32Array(i16.length);
      for (let i = 0; i < i16.length; i++) f32[i] = i16[i] / 32768;
      player.port.postMessage(f32, [f32.buffer]);
    }
  };
  ws.onclose = () => { if (running) { status("切断されました"); stop(); } };

  cap.port.onmessage = e => {
    if (!ws || ws.readyState !== 1) return;
    const f32 = e.data, i16 = new Int16Array(f32.length);
    for (let i = 0; i < f32.length; i++)
      i16[i] = Math.max(-32768, Math.min(32767, f32[i] * 32767));
    ws.send(i16.buffer);
  };
}

function stop() {
  running = false;
  $("btnStart").disabled = false; $("btnStop").disabled = true;
  // 確保した資源をすべて解放する (マイク・WS・AudioContext・解析ノード)
  try { rec && rec.stop(); } catch (_) {} rec = null;
  try { ws && ws.close(); } catch (_) {} ws = null;
  try { micStream && micStream.getTracks().forEach(t => t.stop()); } catch (_) {} micStream = null;
  try { ac && ac.close(); } catch (_) {} ac = null;
  anaU = anaS = null;
  status("停止しました (資源解放済み)");
}

$("btnStart").onclick = () => start().catch(e => { status("失敗: " + e.message); stop(); });
$("btnStop").onclick = stop;

// UI画面を閉じたらサーバごと正常終了させる。
// pagehide で /shutdown に beacon を送る -> サーバは8秒待って再接続が無ければ
// GPU メモリを解放して exit (F5リロードは直後の GET / で終了予約が取り消される)。
// ブラウザ側の資源 (マイク・AudioContext・WS) もここで解放する。
window.addEventListener("pagehide", () => {
  try { navigator.sendBeacon("/shutdown"); } catch (_) {}
  stop();
});
</script>
</body>
</html>
